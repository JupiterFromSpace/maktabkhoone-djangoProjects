name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: todo_project
        run: python -m pytest --tb=short -v
        env:
          DJANGO_SETTINGS_MODULE: todo_project.settings
          PYTHONPATH: /home/runner/work/maktabkhoone-djangoProjects/maktabkhoone-djangoProjects/todo_project

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/maktabkhoone-djangoProjects
            git pull origin main
            docker-compose -f docker-compose-stage.yml up -d --build
            docker-compose -f docker-compose-stage.yml exec -T backend python manage.py migrate
            docker-compose -f docker-compose-stage.yml exec -T backend python manage.py collectstatic --noinput