name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start containers
        run: |
          docker compose up -d --build

      - name: Wait for database
        run: |
          sleep 15

      - name: Run migrations
        run: |
          docker compose exec -T backend python manage.py migrate

      - name: Run tests
        run: |
          docker compose exec -T backend pytest --tb=short -v

      - name: Stop containers
        if: always()
        run: |
          docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/maktabkhoone-djangoProjects
            git pull origin main
            docker compose -f docker-compose-stage.yml down
            docker compose -f docker-compose-stage.yml up -d --build
            docker compose -f docker-compose-stage.yml exec -T backend python manage.py migrate
            docker compose -f docker-compose-stage.yml exec -T backend python manage.py collectstatic --noinput
