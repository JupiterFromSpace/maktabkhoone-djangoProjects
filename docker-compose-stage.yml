version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: maktabkhoone-db
    environment:
      - POSTGRES_DB=todo_db
      - POSTGRES_USER=todo_user
      - POSTGRES_PASSWORD=todo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: .
    container_name: maktabkhoone-backend
    command: sh -c "python manage.py migrate && gunicorn todo_project.wsgi --bind 0.0.0.0:8000"
    volumes:
      - ./todo_project:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    environment:
      - SECRET_KEY=test
      - DEBUG=False
      - DB_NAME=todo_db
      - DB_USER=todo_user
      - DB_PASSWORD=todo_password
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
      - redis

  celery:
    build: .
    container_name: maktabkhoone-celery
    command: celery -A todo_project worker -l info
    volumes:
      - ./todo_project:/app
    environment:
      - SECRET_KEY=test
      - DEBUG=False
      - DB_HOST=db
      - DB_NAME=todo_db
      - DB_USER=todo_user
      - DB_PASSWORD=todo_password
    depends_on:
      - redis
      - backend

  celery-beat:
    build: .
    container_name: maktabkhoone-celery-beat
    command: celery -A todo_project beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./todo_project:/app
    environment:
      - SECRET_KEY=test
      - DEBUG=False
      - DB_HOST=db
      - DB_NAME=todo_db
      - DB_USER=todo_user
      - DB_PASSWORD=todo_password
    depends_on:
      - db
      - redis
      - backend

  redis:
    image: redis:7-alpine
    container_name: maktabkhoone-redis
    restart: unless-stopped

  nginx:
    image: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:

