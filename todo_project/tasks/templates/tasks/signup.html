<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>signup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Tahoma, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1); width: 100%; max-width: 380px; }
    h2 { text-align: center; margin-bottom: 1.5rem; color: #333; }
    label { display: block; margin-bottom: .25rem; font-size: .9rem; color: #555; }
    input { width: 100%; padding: .6rem .8rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; margin-bottom: 1rem; }
    input:focus { outline: none; border-color: #6366f1; }
    button { width: 100%; padding: .75rem; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #4f46e5; }
    .login-link { text-align: center; margin-top: 1rem; font-size: .9rem; }
    .login-link a { color: #6366f1; }
    .errors { color: #dc2626; font-size: .85rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h2>ثبت‌نام</h2>
    {% if form.errors %}
      <div class="errors">{{ form.errors }}</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <label>ایمیل</label>
      <input type="email" name="email">
      <label>رمز عبور</label>
      <input type="password" name="password1">
      <label>تکرار رمز عبور</label>
      <input type="password" name="password2">
      <button type="submit">ثبت‌نام</button>
    </form>
    <div class="login-link">
      حساب داری؟ <a href="{% url 'login' %}">login</a>
    </div>
  </div>
</body>
</html>
